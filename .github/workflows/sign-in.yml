name: 每日签到

on:
  push:
  workflow_dispatch:

jobs:
  sign-in:
    # Ubuntu 24.04 不再提供 Python 3.8，需使用 22.04
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 下载并解密 login
        env:
          AES_PASSWORD: ${{ secrets.AES_PASSWORD }}
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
          ALL_PROXY: ""
        run: python src/download_and_decrypt.py

      - name: 执行签到
        run: python src/login.py
